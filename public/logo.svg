<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 300 300" fill="none">
  <defs>
    <!-- Ultra Vibrant Hologram Sweeping Gradients -->
    <linearGradient id="vibrantSweepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2ff" />
      <stop offset="30%" stop-color="#d946ef" />
      <stop offset="65%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ffdd00" />
    </linearGradient>

    <linearGradient id="vibrantBoundaryGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#b063ff" />
      <stop offset="50%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <linearGradient id="vibrantInnerGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2ff" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <linearGradient id="vibrantLetterCGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#00f2ff" />
      <stop offset="70%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <radialGradient id="vibrantHexFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#090a21" stop-opacity="0.95" />
      <stop offset="60%" stop-color="#04091a" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#02030b" stop-opacity="0.98" />
    </radialGradient>

    <!-- Holographic Neon Glowing Filters -->
    <filter id="neonGlowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur-blur"/>
      <feMerge>
        <feMergeNode in="blur-blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes sweep-spin-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes sweep-spin-ccw {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes neon-pulse-dot {
      0%, 100% { opacity: 0.75; r: 8px; filter: drop-shadow(0 0 4px #00f2ff); }
      50% { opacity: 1; r: 13px; filter: drop-shadow(0 0 12px #ff007f); }
    }
    @keyframes neon-glow-hex {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(255, 0, 127, 0.4)) rotate(0.3deg); }
      50% { filter: drop-shadow(0 0 16px rgba(0, 242, 255, 0.75)) rotate(-0.3deg); }
    }
    .sweep-spin-cw {
      transform-origin: 150px 150px;
      animation: sweep-spin-cw 12s linear infinite;
    }
    .sweep-spin-ccw {
      transform-origin: 150px 150px;
      animation: sweep-spin-ccw 8s linear infinite;
    }
    .neon-pulse-dot {
      transform-origin: 150px 150px;
      animation: neon-pulse-dot 2s ease-in-out infinite;
    }
    .neon-glow-hex {
      transform-origin: 150px 150px;
      animation: neon-glow-hex 4s ease-in-out infinite;
    }
  </style>

  <!-- Deep dark obsidian background shield with vibrant custom border -->
  <rect width="300" height="300" rx="68" fill="#02040e" stroke="url(#vibrantSweepGrad)" stroke-width="4.5" opacity="0.98" />

  <!-- Outer concentric scanning sweep circles (rotating clockwise) -->
  <circle cx="150" cy="150" r="116" stroke="url(#vibrantSweepGrad)" stroke-width="6.5" stroke-linecap="round" stroke-dasharray="55 25 30 40" class="sweep-spin-cw" opacity="0.95" />

  <!-- Inner diagnostic scanning guide (rotating counter-clockwise & glowing) -->
  <circle cx="150" cy="150" r="128" stroke="url(#vibrantInnerGrad)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="20 12 40 18" class="sweep-spin-ccw" opacity="0.75" />

  <!-- Rotating Quantum Hexagon -->
  <polygon points="150,62 226,106 226,194 150,238 74,194 74,106" stroke="url(#vibrantBoundaryGrad)" stroke-width="11" stroke-linejoin="round" class="neon-glow-hex" fill="url(#vibrantHexFill)" />

  <!-- Sovereign High-Contrast Neon 'C' Emblem -->
  <path d="M188,118 C180,105 168,96 150,96 C118,96 98,118 98,150 C98,182 118,204 150,204 C168,204 180,195 188,182" stroke="url(#vibrantLetterCGrad)" stroke-width="16.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlowFilter)" />

  <!-- Core dual-state focus center points -->
  <circle cx="150" cy="150" r="11" fill="#ff007f" class="neon-pulse-dot" />
  <circle cx="150" cy="150" r="5.5" fill="#00f2ff" />
</svg>
